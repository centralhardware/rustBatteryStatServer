name: Build and Publish Docker Image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: ['*']

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build (PR check)
        if: github.event_name == 'pull_request'
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build --release
        if: github.event_name == 'pull_request'

      - name: Set up Docker Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via Coolify
        if: github.event_name == 'push'
        env:
          COOLIFY_DEPLOY_HOOK_URL: ${{ vars.COOLIFY_DEPLOY_HOOK_URL }}
          COOLIFY_DEPLOY_BEARER_TOKEN: ${{ secrets.COOLIFY_DEPLOY_BEARER_TOKEN }}
        run: |
          if [ -n "$COOLIFY_DEPLOY_HOOK_URL" ]; then
            curl -s -f "$COOLIFY_DEPLOY_HOOK_URL" \
              -H "Authorization: Bearer $COOLIFY_DEPLOY_BEARER_TOKEN" || true
          fi
